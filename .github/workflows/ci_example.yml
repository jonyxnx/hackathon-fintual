name: kitdoc CI example (self-doc)

on:
  workflow_dispatch:
    inputs:
      base_sha:
        description: "Base commit SHA (defaults to HEAD~1)"
        required: false
      head_sha:
        description: "Head commit SHA (defaults to HEAD)"
        required: false
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: kitdoc-self-doc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-document:
    name: Document kitdoc with kitdoc
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Secrets (OPENAI_API_KEY, NOTION_TOKEN, NOTION_PAGE_ID) live in the "main"
    # GitHub Environment, so the job must opt into that environment to read them.
    environment: main

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364edaf087 # v4.2.2
        with:
          fetch-depth: 64

      - name: Resolve base / head SHAs
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.inputs.base_sha || github.event.before }}"
          HEAD="${{ github.event.inputs.head_sha || github.sha }}"
          # First push to a branch reports an all-zero `before` SHA. Fall back to HEAD~1.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE=$(git rev-parse "${HEAD}^" 2>/dev/null || echo "$HEAD")
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "Using base=$BASE head=$HEAD"

      - name: Run kitdoc against this repo and sync to Notion
        uses: ./.github/actions/kitdoc-docs
        with:
          target-repository: ${{ github.repository }}
          target-ref: ${{ steps.shas.outputs.head }}
          kitdoc-repository: ${{ github.repository }}
          kitdoc-ref: ${{ github.sha }}
          base-sha: ${{ steps.shas.outputs.base }}
          head-sha: ${{ steps.shas.outputs.head }}
          repo-owner: ${{ github.repository_owner }}
          repo-name: ${{ github.event.repository.name }}
          target-path: .
          kitdoc-path: .
          skip-target-checkout: "true"
          skip-kitdoc-checkout: "true"
          llm-provider: openai
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          document-all: "false"
          depth: "5"
          doc-concurrency: "4"
          notion-token: ${{ secrets.NOTION_TOKEN }}
          notion-page-id: ${{ secrets.NOTION_PAGE_ID }}
