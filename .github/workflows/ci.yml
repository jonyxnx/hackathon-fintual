name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364edaf087 # v4.2.2

      - uses: actions/setup-node@49933ea528792ca6c148322314ed9a9a99a97e4a # v4.4.0
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run typecheck
